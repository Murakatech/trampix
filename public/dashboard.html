<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trampix - Meu Dashboard</title>
    <!-- REMOVA O 'x' ANTES DE 'integrity' -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/dashboard-user.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Trampix</a> <!-- Link para a Landing Page -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/dashboard">Dashboard</a> <!-- Link para o próprio dashboard -->
                    </li>
                    <!-- Links que aparecerão dependendo do tipo de usuário -->
                    <li class="nav-item" id="freelancerLink" style="display: none;">
                        <a class="nav-link" href="#">Meu Perfil Freelancer</a>
                    </li>
                    <li class="nav-item" id="companyLink" style="display: none;">
                        <a class="nav-link" href="#">Minha Empresa</a>
                    </li>
                    <li class="nav-item" id="adminLink" style="display: none;">
                        <a class="nav-link" href="#">Painel Admin</a>
                    </li>
                    <li class="nav-item" id="vagasLink">
                        <a class="nav-link" href="#">Vagas</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-white" id="userEmailDisplay"></span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-danger btn-sm" id="logoutBtn">Sair</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="welcome-section text-center">
            <h2 class="mb-3">Bem-vindo(a) ao seu Dashboard, <span id="userNameDisplay"></span>!</h2>
            <p class="lead" id="userTypeDisplay"></p>
        </div>

        <hr class="my-4">

        <div class="user-info">
            <h3>Informações da Conta:</h3>
            <p><strong>Email:</strong> <span id="userInfoEmail"></span></p>
            <p><strong>ID:</strong> <span id="userInfoId"></span></p>
            <p><strong>Status:</strong> <span id="userInfoStatus"></span></p>
            <p><strong>Criado em:</strong> <span id="userInfoCreatedAt"></span></p>
        </div>

        <div id="dashboardMessage" class="mt-4"></div>
    </div>

    <!-- REMOVA O 'x' ANTES DE 'integrity' -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eGYQ7N6kfm4+zQ" crossorigin="anonymous"></script>
    <script src="js/dashboard-user.js"></script>
</body>
</html>
